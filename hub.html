<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hub de protótipos — Núcleo de Inovação SAMU">
  <title>Hub — Protótipos INOVA SAMU</title>
  <link rel="stylesheet" href="./assets/css/hub.css">
</head>
<body>

  <!-- Topbar -->
  <nav class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">🚑</div>
      <div class="topbar-title">INOVA SAMU <span>/ protótipos</span></div>
    </div>
    <div class="topbar-user">
      <span class="topbar-username" id="displayUser"></span>
      <button class="btn-logout" id="btnLogout">Sair</button>
    </div>
  </nav>

  <!-- Conteúdo -->
  <main class="hub-main">
    <header class="hub-header">
      <h1>📦 Protótipos</h1>
      <p>Selecione um protótipo para acessar.</p>
    </header>

    <div class="protos-grid" id="protosGrid">

      <!-- NUTRAN-CHECKLIST -->
      <a href="./NUTRAN-CHECKLIST/" class="proto-card" id="cardChecklist">
        <div class="proto-card-icon icon-checklist">📋</div>
        <h2 class="proto-card-title">NUTRAN — Checklist</h2>
        <p class="proto-card-desc">Mapeamento cartesiano para checklist visual de viaturas do SAMU.</p>
        <span class="proto-card-status status-active">● Ativo</span>
      </a>

      <!-- ROTA-GPS -->
      <a href="./ROTA-GPS/" class="proto-card" id="cardGps">
        <div class="proto-card-icon icon-gps">🗺️</div>
        <h2 class="proto-card-title">ROTA-GPS</h2>
        <p class="proto-card-desc">Sistema de rotas e geolocalização para viaturas.</p>
        <span class="proto-card-status status-active">● Ativo</span>
      </a>

    </div>
  </main>

  <script>
    // ─── Logout (volta para a tela inicial) ─────
    document.getElementById('btnLogout').addEventListener('click', () => {
      window.location.href = './index.html';
    });
  </script>
</body>
</html>
