<!doctype html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Protótipos INOVA — Painel</title>

    <!-- Script de inicialização do tema - executa IMEDIATAMENTE para evitar flash -->
    <script>
      (function () {
        try {
          const saved = localStorage.getItem("theme");
          const theme =
            saved === "dark" || saved === "light"
              ? saved
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";

          const html = document.documentElement;

          if (theme === "dark") {
            html.setAttribute("data-theme", "dark");
            html.classList.add("dark", "dark-theme");
            html.style.cssText =
              "background-color: #0f0f0f !important; color: #f8fafc !important;";
          } else {
            html.setAttribute("data-theme", "light");
            html.classList.remove("dark", "dark-theme");
            html.style.cssText =
              "background-color: #e5e7eb !important; color: #1a1a1a !important;";
          }

          localStorage.setItem("theme", theme);
        } catch (error) {
          console.warn("Erro tema:", error);
        }
      })();
    </script>

    <!-- CSS crítico para tema -->

      html,
      body {
        margin: 0;
        padding: 0;
        transition: background-color 0.3s ease, color 0.3s ease;
        font-family: "Roboto", sans-serif;
      }
      html[data-theme="dark"] {
        background-color: #0f0f0f !important;
        color: #f8fafc !important;
      }
      html[data-theme="light"] {
        background-color: #e5e7eb !important;
        color: #1a1a1a !important;
      }
      html[data-theme="dark"] body {
        background-color: #0f0f0f !important;
      }
      html[data-theme="light"] body {
        background-color: #e5e7eb !important;
      }

    <!-- Scripts -->

    <!-- Theme toggle (reuse login logic) -->
    <script>
      (function () {
        const toggle = document.getElementById("themeToggle");
        if (!toggle) return;

        const html = document.documentElement;
        const theme = localStorage.getItem("theme") || "light";
        toggle.checked = theme === "dark";

        toggle.addEventListener("change", function () {
          const isDark = this.checked;
          const newTheme = isDark ? "dark" : "light";

          if (isDark) {
            html.setAttribute("data-theme", "dark");
            html.classList.add("dark", "dark-theme");
            html.style.cssText =
              "background-color: #0f0f0f !important; color: #f8fafc !important;";
          } else {
            html.setAttribute("data-theme", "light");
            html.classList.remove("dark", "dark-theme");
            html.style.cssText =
              "background-color: #e5e7eb !important; color: #1a1a1a !important;";
          }

          localStorage.setItem("theme", newTheme);
        });

        // Logout do header
        const logoutHeader = document.getElementById("logoutBtnHeader");
        if (logoutHeader) {
          logoutHeader.addEventListener("click", function (e) {
            e.preventDefault();
            localStorage.removeItem("isAuthenticated");
            localStorage.removeItem("userName");
            window.location.href = "/";
          });
        }
      })();
    </script>

    <!-- Dark mode card styles -->
    <style>
      /* ── Gradiente horizontal animado do título ── */
      .hub-welcome-title {
        background: linear-gradient(90deg, #c2410c, #eb5224, #e31837, #eb5224, #c2410c);

        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: hub-gradient-slide 6s ease-in-out infinite;
      }

      @keyframes hub-gradient-slide {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* Dark mode */
      html.dark-theme .hub-welcome-title {
        background: linear-gradient(90deg, #ea580c, #ef4444, #eb5224, #ea580c);
        background-size: 300% 100%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: hub-gradient-slide 6s ease-in-out infinite;
      }

      html.dark-theme .group {
        background: rgba(23, 23, 23, 0.7) !important;
        border-color: rgba(64, 64, 64, 0.5) !important;
      }
      html.dark-theme .group h3 {
        color: rgba(243, 244, 246, 0.95) !important;
      }
      html.dark-theme .group p {
        color: rgba(156, 163, 175, 0.8) !important;
      }
      html.dark-theme .app-layout__main > div > p {

      html.dark-theme .app-layout__footer {

        border-color: rgba(64, 64, 64, 0.4) !important;
      }
