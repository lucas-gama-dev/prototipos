<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Prototipo - Mapeamento Cartesiano de Checklist</title>
        <link rel="icon" href="data:," />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        />
        <link rel="stylesheet" href="./style.css" />
    </head>
    <body>
        <main class="app">
            <header class="topbar">
                <div class="title-block">
                    <h1><i class="fa-solid fa-map-location-dot"></i> Mapeamento Cartesiano (X/Y)</h1>
                    <span class="badge badge-prototype">PROTÓTIPO</span>
                </div>
                <div class="actions">
                    <label class="vehicle-field" for="typeSelect">
                        <span
                            ><i class="fa-solid fa-ambulance"></i>
                            Ve&iacute;culo</span
                        >
                        <select id="typeSelect"></select>
                    </label>
                </div>
            </header>

            <section class="layout">
                <section
                    class="canvas-card"
                    aria-label="Area de mapeamento cartesiano"
                >
                    <div class="canvas-heading">
                        <div class="view-controls">
                            <div id="imageTabs" class="image-tabs"></div>
                            <div class="view-mode">
                                <button
                                    id="modeSingle"
                                    class="mode-btn is-active"
                                    type="button"
                                    title="Uma imagem por vez"
                                >
                                    <svg
                                        width="18"
                                        height="14"
                                        viewBox="0 0 18 14"
                                        fill="none"
                                    >
                                        <rect
                                            x="1"
                                            y="1"
                                            width="16"
                                            height="12"
                                            rx="2"
                                            stroke="currentColor"
                                            stroke-width="1.5"
                                        />
                                    </svg>
                                </button>
                                <button
                                    id="modeDual"
                                    class="mode-btn"
                                    type="button"
                                    title="Lado a lado"
                                >
                                    <svg
                                        width="24"
                                        height="14"
                                        viewBox="0 0 24 14"
                                        fill="none"
                                    >
                                        <rect
                                            x="1"
                                            y="1"
                                            width="10"
                                            height="12"
                                            rx="2"
                                            stroke="currentColor"
                                            stroke-width="1.5"
                                        />
                                        <rect
                                            x="13"
                                            y="1"
                                            width="10"
                                            height="12"
                                            rx="2"
                                            stroke="currentColor"
                                            stroke-width="1.5"
                                        />
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <output id="liveCoords" class="live-coords"
                            >X 0.00 / Y 0.00</output
                        >
                    </div>

                    <div
                        id="mapsContainer"
                        class="maps-container mode-single"
                    ></div>
                </section>

                <aside class="panel">
                    <div class="panel-header">
                        <h2>
                            <i class="fa-solid fa-list-check"></i> Pontos de
                            checklist
                        </h2>
                        <span id="count" class="badge"></span>
                    </div>

                    <div class="table-wrap">
                        <div class="table-header-container">
                            <table class="table-header">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Descri&ccedil;&atilde;o</th>
                                        <th>X (%)</th>
                                        <th>Y (%)</th>
                                        <th></th>
                                    </tr>
                                </thead>
                            </table>
                        </div>
                        <div class="table-body">
                            <table>
                                <tbody id="tableBody"></tbody>
                            </table>
                        </div>
                    </div>

                    <section class="help-box" aria-label="Como funciona">
                        <h3><i class="fa-solid fa-circle-info"></i> Como funciona</h3>
                        <ul>
                            <li>
                                <strong>(0,0)</strong> = canto superior esquerdo
                            </li>
                            <li>
                                <strong>(100,0)</strong> = canto superior
                                direito
                            </li>
                            <li>
                                <strong>(0,100)</strong> = canto inferior
                                esquerdo
                            </li>
                            <li>
                                <strong>(100,100)</strong> = canto inferior
                                direito
                            </li>
                        </ul>
                    </section>

                    <button id="btnOpenJson" class="json-trigger" type="button">
                        <i class="fa-solid fa-code"></i> JSON dos pontos
                    </button>

                    <!-- Modal JSON -->
                    <div id="jsonModal" class="modal-overlay" hidden>
                        <div class="modal-box">
                            <div class="modal-header">
                                <h3><i class="fa-solid fa-code"></i> JSON dos pontos</h3>
                                <div class="modal-actions">
                                    <button id="btnCopyJson" class="modal-copy" type="button" title="Copiar JSON">
                                        <i class="fa-regular fa-copy"></i> Copiar
                                    </button>
                                    <button id="btnCloseJson" class="modal-close" type="button" aria-label="Fechar" title="Fechar">
                                        <i class="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                            </div>
                            <pre id="jsonOutput"></pre>
                        </div>
                    </div>
                </aside>
            </section>
        </main>

        <script src="./app.js"></script>
    </body>
</html>
