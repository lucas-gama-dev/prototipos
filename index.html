<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Protótipos INOVA - Login</title>

    <!-- Script de inicialização do tema - executa IMEDIATAMENTE para evitar flash -->
    <script>
      (function () {
        try {
          const saved = localStorage.getItem("theme");
          const theme =
            saved === "dark" || saved === "light"
              ? saved
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";

          const html = document.documentElement;

          if (theme === "dark") {
            html.setAttribute("data-theme", "dark");
            html.classList.add("dark", "dark-theme");
            html.style.cssText =
              "background-color: #0f0f0f !important; color: #f8fafc !important;";
          } else {
            html.setAttribute("data-theme", "light");
            html.classList.remove("dark", "dark-theme");
            html.style.cssText =
              "background-color: #e5e7eb !important; color: #1a1a1a !important;";
          }

          localStorage.setItem("theme", theme);
        } catch (error) {
          console.warn("Erro tema:", error);
        }
      })();
    </script>

    <!-- CSS crítico para tema -->
    <style>
      html,
      body {
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }
      html[data-theme="dark"] {
        background-color: #0f0f0f !important;
        color: #f8fafc !important;
      }
      html[data-theme="light"] {
        background-color: #e5e7eb !important;
        color: #1a1a1a !important;
      }
      html[data-theme="dark"] body {
        background-color: #0f0f0f !important;
        color: #f8fafc !important;
      }
      html[data-theme="light"] body {
        background-color: #e5e7eb !important;
        color: #1a1a1a !important;
      }
    </style>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    <script>
      if (typeof tailwind !== "undefined") {
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                primary: {
                  50: "#f0f9ff",
                  100: "#e0f2fe",
                  200: "#bae6fd",
                  300: "#7dd3fc",
                  400: "#38bdf8",
                  500: "#0ea5e9",
                  600: "#0284c7",
                  700: "#0369a1",
                  800: "#075985",
                  900: "#0c4a6e",
                },
              },
            },
          },
        };
      }
    </script>

    <!-- Fontes -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- CSS da aplicação -->
    <link rel="stylesheet" href="assets/css/login.css" />
    <link rel="stylesheet" href="assets/css/login-functions.css" />
    <link rel="stylesheet" href="assets/css/TemaButton.css" />
  </head>
  <body class="app-shell">
    <!-- Cabeçalho com botão de tema -->
    <div class="fixed top-5 right-5" style="z-index: 1000">
      <div class="theme-toggle-wrapper">
        <input
          type="checkbox"
          id="themeToggle"
          class="theme-toggle"
          aria-label="Alternar tema claro/escuro"
        />
        <label for="themeToggle" class="theme-toggle-label">
          <div class="slider-icons">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none">
              <circle
                cx="12"
                cy="12"
                r="5"
                stroke="currentColor"
                stroke-width="2"
              />
              <path
                d="M12 2V4"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="M12 20V22"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="M4 12H2"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="M22 12H20"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="M19.7778 4.22266L17.5558 6.25424"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="M4.22217 4.22266L6.44418 6.25424"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="M6.44434 17.5557L4.22211 19.7779"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="M19.7778 19.7773L17.5558 17.5551"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none">
              <path
                d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
        </label>
      </div>
    </div>

    <!-- Container principal -->
    <div
      class="min-h-screen flex items-center justify-center w-full p-2 sm:p-4 lg:p-5"
    >
      <div
        class="login-container bg-opacity-50 rounded-xl shadow-2xl w-full max-w-md lg:max-w-lg xl:max-w-md p-4 sm:p-6 lg:p-6 space-y-4 sm:space-y-5 lg:space-y-5"
      >
        <!-- Logotipo e Título -->
        <div class="text-center">
          <h1
            class="text-3xl sm:text-4xl lg:text-4xl font-bold text-neutral-700 mb-2 sm:mb-3 lg:mb-3 intranet-gradient-text"
          >
            PROTÓTIPOS INOVA
          </h1>
          <img
            src="assets/img/logo_samu_192.png"
            alt="SAMU 192"
            class="h-28 sm:h-32 lg:h-32 mx-auto mb-0"
          />
          <p
            class="text-xs sm:text-sm lg:text-sm text-neutral-700 mb-0 font-roboto font-bold"
          >
            Serviço de Atendimento Móvel de Urgência (SAMU-DF)
          </p>
        </div>

        <!-- Formulário de Login -->
        <form
          id="loginForm"
          action="/login"
          method="POST"
          class="space-y-4 lg:space-y-5 login-form"
          novalidate
        >
          <div>
            <label
              for="user"
              class="block text-sm lg:text-sm font-medium text-neutral-700"
            >
              Matrícula / Email
            </label>
            <div class="input-container">
              <input
                type="text"
                id="user"
                name="email"
                class="input-field mt-1 block w-full px-3 py-2 lg:py-2 text-sm lg:text-sm border border-neutral-300 rounded-md shadow-sm font-roboto"
                placeholder="Digite sua matrícula ou email"
                title="Digite um email válido ou uma matrícula."
                maxlength="40"
                autocomplete="username"
                required
              />
              <span
                class="char-counter text-xs lg:text-xs font-roboto"
                id="userCounter"
                >0/40</span
              >
              <img
                src="assets/icons/login-user.svg"
                class="input-icon h-6.25 w-6.25 lg:h-6.25 lg:w-6.25"
                style="right: 0.5rem; left: auto"
                alt="Ícone de usuário"
                title="Campo usuário"
              />
            </div>
          </div>

          <div>
            <label
              for="password"
              class="block text-sm lg:text-sm font-medium text-neutral-700"
            >
              Senha
            </label>
            <div class="password-container">
              <input
                type="password"
                id="password"
                name="password"
                class="input-field mt-1 block w-full px-3 py-2 lg:py-2 text-sm lg:text-sm border border-neutral-300 rounded-md shadow-sm font-roboto"
                placeholder="Digite sua senha"
                maxlength="10"
                autocomplete="current-password"
                required
              />
              <span
                class="char-counter text-xs lg:text-xs font-roboto"
                id="passwordCounter"
                >0/10</span
              >
              <img
                src="assets/icons/login-eye-closed.svg"
                class="toggle-password h-6.25 w-6.25 lg:h-6.25 lg:w-6.25"
                id="togglePassword"
                alt="Mostrar senha"
                title="Mostrar senha"
              />
            </div>
          </div>

          <div class="flex items-center justify-between">
            <div class="flex items-center">
              <label
                id="remember-label"
                for="remember-me"
                class="login-aux-button flex items-center gap-2 px-2.5 py-0.5 text-sm font-medium transition duration-300 ease-in-out cursor-pointer group font-roboto"
                title="Selecione para salvar o nome do usuário"
              >
                <input
                  id="remember-me"
                  name="remember-me"
                  type="checkbox"
                  class="sr-only"
                  onchange="
                    this.parentElement.classList.toggle(
                      'login-aux-button--active',
                    )
                  "
                />
                <span>Lembrar-me</span>
              </label>
            </div>

            <div class="text-sm lg:text-base">
              <a
                href="#"
                onclick="
                  alert('Funcionalidade em desenvolvimento');
                  return false;
                "
                class="forgot-link login-aux-button inline-block px-2.5 py-0.5 text-sm font-medium transition duration-300 ease-in-out cursor-pointer font-roboto"
              >
                Esqueceu sua senha?
              </a>
            </div>
          </div>

          <div>
            <button
              id="loginButton"
              type="submit"
              class="login-button w-full flex justify-center py-1.5 lg:py-1.5 px-4 lg:px-5 border border-transparent rounded-md shadow-sm text-sm lg:text-sm font-medium text-white bg-red-600 hover:bg-red-700 transition duration-300 ease-in-out transform hover:scale-105 font-roboto"
            >
              Entrar
            </button>
          </div>
        </form>

        <!-- Mensagem de Desenvolvimento -->
        <div
          class="text-center text-[10px] sm:text-xs lg:text-xs text-neutral-600 mt-1 flex flex-col items-center"
        >
          <span
            class="text-[8px] sm:text-[10px] lg:text-[10px] font-medium font-roboto"
            >DESENVOLVIDO POR</span
          >
          <a
            href="https://inova.in"
            target="_blank"
            rel="noopener"
            class="inline-block mt-1"
          >
            <img
              src="assets/img/logo_inova.png"
              alt="Inova Logo"
              class="h-8 sm:h-10 lg:h-10 mt-1 sm:mt-1"
              title="Ir para inova.in"
            />
          </a>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/login.js"></script>
  </body>
</html>
